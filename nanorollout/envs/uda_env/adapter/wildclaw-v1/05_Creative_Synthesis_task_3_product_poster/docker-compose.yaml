version: "3.8"

services:
  wildclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wildclaw-05_Creative_Synthesis_task_3_product_poster
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - JUDGE_MODEL=${JUDGE_MODEL:-openai/gpt-5.4}
    volumes:
      - ./:/tmp_workspace
    working_dir: /tmp_workspace
