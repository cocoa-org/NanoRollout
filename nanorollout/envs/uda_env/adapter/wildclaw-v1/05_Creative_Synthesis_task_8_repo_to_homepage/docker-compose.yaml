version: "3.8"

services:
  wildclaw:
    build: .
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - JUDGE_MODEL=${JUDGE_MODEL:-openai/gpt-5.4}
    volumes:
      - ./:/workspace
    working_dir: /tmp_workspace
    command: /bin/bash
