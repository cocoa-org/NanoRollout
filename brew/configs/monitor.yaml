output_dir: ${oc.env:TINYFLOW_OUTPUT_DIR,./results}

monitoring:
  enabled: true
  interval_s: 30
  print_summary: true
  wandb:
    enabled: true
    project: ${oc.env:WANDB_PROJECT,tinyflow-cluster}
    entity: null
    run_name: rollout-${oc.env:SLURM_JOB_ID,manual}
    group: ${oc.env:WANDB_GROUP,tinyflow-rollout}
    job_type: cluster-monitor
    tags: ["tinyflow", "multinode", "resource-monitor"]
    config:
      scheduler: slurm
